name: API Tests - Petstore

on:
  push:
    paths:
      - "api-tests/**"
  pull_request:
    paths:
      - "api-tests/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api-tests
        run: pip install -r requirements.txt

      - name: Run API tests
        working-directory: api-tests
        run: pytest --tb=short
