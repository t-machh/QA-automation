name: Web Tests - SauceDemo

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Chrome (via chrome-for-testing)
        run: |
          # Baixa e instala o Chrome for Testing (versão estável)
          CHROME_VERSION=$(curl -s https://googlechromelabs.github.io/chrome-for-testing/latest-stable.txt)
          wget -q https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/linux64/chrome-linux64.zip
          unzip -q chrome-linux64.zip
          sudo mv chrome-linux64 /opt/chrome
          sudo ln -s /opt/chrome/chrome /usr/local/bin/chrome
          chrome --version

      - name: Instalar Chromedriver (via chrome-for-testing, mesma versão)
        run: |
          CHROME_VERSION=$(curl -s https://googlechromelabs.github.io/chrome-for-testing/latest-stable.txt)
          wget -q https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/linux64/chromedriver-linux64.zip
          unzip -q chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest faker

      - name: Executar testes E2E
        working-directory: ./Teste_E2E
        env:
          HEADLESS: "true"
        run: pytest tests/test_e2e_purchase.py -v --tb=short